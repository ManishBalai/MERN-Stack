<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table, tr, td {
            border: 5px solid black;
            border-collapse: collapse;
        }

        .small {
            font-size: small;
        }

        .large {
            font-size: large;
        }
    </style>
</head>
<body>
    <!-- Sir said to do it, so i did it -->
    <table>
        <tr>
            <td>Name</td>
            <td>Age</td>
        </tr>
        <tr>
            <td>Naman</td>
            <td>25</td>
        </tr>
        <tr>
            <td>Karthik</td>
            <td>20</td>
        </tr>
    </table>

    <h1 class="small">Hello Ji</h1>
    <h2 class="small">Hello Ji</h2>
    <h3 class="small">Hello Ji</h3>
    <h4 class="large">Hello Ji</h4>
    <h5 class="large">Hello Ji</h5>
    <h6 class="large">Hello Ji</h6>
</body>
</html>
