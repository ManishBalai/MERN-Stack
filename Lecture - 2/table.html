<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in HTML</title>
    <style>
        table, th, tr, td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <caption>Monthly Saving</caption>
        <thead>
            <tr>
                <th>Month's</th>
                <th>Saving</th>
            </tr>
        </thead>
        
        <tbody>
            <tr>
            <td>January</td>
            <td>150</td>
            </tr>
            <tr>
                <td>February</td>
                <td>100</td>
            </tr>
            <tr>
                <td>March</td>
                <td>Pending</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td>Total</td>
                <td>250</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
