<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Position Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- STICKY -->
  <nav class="navbar">
    Sticky Navbar
  </nav>

  <!-- STATIC -->
  <div class="box static">
    Static Box (Default)
  </div>

  <!-- RELATIVE + ABSOLUTE -->
  <div class="card">
    <span class="badge">New</span>
    <h3>Relative Parent</h3>
    <p>This card has an absolute badge.</p>
  </div>

  <!-- Some content to enable scrolling -->
  <div class="content">
    Scroll down to see fixed button and sticky navbar working...
  </div>

  <!-- FIXED -->
  <button class="floating-btn">Help</button>

</body>
</html>
