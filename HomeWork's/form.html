<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h2>Welcome to CodeHelp</h2>
    <h2>Contact Us Form</h2>
    <form action="">
        <label for="name">Name</label>
        <input type="text" name="name"><br>

        <label for="email">Email</label>
        <input type="email" name="email"><br>

        <label for="contact">Contact Number</label>
        <input type="number" name="contact"><br>

        <label for="gender">Gender</label>
        <select name="gender" id="gender">
            <option value="male">male</option>
            <option value="female">female</option>
            <option value="not-say">rather not to say</option>
        </select> <br>

        <label for="dob">Date Of Birth</label>
        <input type="date" name="dob" id="dob"> <br>

        <label for="rating">Rating</label>
        <input type="radio" name="rating" id="1">
        <label for="1">1</label>
        <input type="radio" name="rating" id="2">
        <label for="2">2</label>
        <input type="radio" name="rating" id="3">
        <label for="3">3</label>
        <input type="radio" name="rating" id="4">
        <label for="4">4</label>
        <input type="radio" name="rating" id="5">
        <label for="5">5</label> <br>

        <label for="msg">Enter Your Message</label> <br>
        <textarea name="msg" id="msg" rows="4" cols="30">Enter Your Message</textarea> <br>

        <button>Send</button>
        <button>Reset</button>

    </form>
</body>
</html>
