<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rowspan and colspan</title>
    <style>
        table, td, tr {
            border: 1px, solid black;
            border-collapse: collapse;
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td colspan="2">abc</td>
            <td rowspan="3">cde</td>
        </tr>
        <tr>
            <td>def</td>
            <td>efg</td>
        </tr>
        <tr>
            <td>ghi</td>
            <td>hij</td>
        </tr>
        <tr>
            <td rowspan="2" colspan="2">jkl</td>
            <td>lmn</td>
        </tr>
        <tr>
            <td>opq</td>
        </tr>
    </table>
</body>
</html>
